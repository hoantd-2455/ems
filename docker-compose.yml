services:
  mysql:
    image: mysql:8.4
    container_name: mysql-ems
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: ems_db
      MYSQL_USER: ems_user
      MYSQL_PASSWORD: ems1234
    ports:
      - "3306:3306"       # host:container — truy cập qua localhost:3306
    volumes:
      - mysql-ems-data:/var/lib/mysql   # Lưu data vĩnh viễn
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-ems-data: