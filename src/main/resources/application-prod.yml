spring:
  datasource:
    url: jdbc:mysql://prod-db-server:3306/ems_db?useSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME} # đọc từ biến môi trường — không hardcode password
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # chỉ kiểm tra schema, không tự sửa — an toàn hơn
    show-sql: false # không in SQL ra console — tránh lộ data
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

logging:
  level:
    root: WARN # chỉ cảnh báo và lỗi
    com.example.ems: INFO # log INFO của project (không có DEBUG)
    org.hibernate.SQL: WARN # không in SQL queries — tránh lộ dữ liệu nhạy cảm
